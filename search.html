<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/flight-listing.css" />
    <link rel="stylesheet" href="./search.css">
</head>

<body>
    <div class="div1">
        <div class="box1">
            <i class="fa-solid fa-plane"></i>
            <a href="#">Find Flights</a>
        </div>
        <div class="box2">
            <i class="fa-solid fa-bed"></i>
            <a href="#">Find Stays</a>
        </div>
        <div class="box3">
            <img src="./rasmlar/logo.webp" alt="">
        </div>
        <div class="box4">
            <a href="#">Login</a>
            <button>Sign Up</button>
        </div>
    </div>
    <div class="div2">
        <div class="teks">
            <h3>Make your travel whishlist, we’ll do the rest</h3>
            <p>Special offers to suit your plan</p>
        </div>
    </div>
    <div class="div3">
        <h2>Where are you flying?</h2>
        <form class="moll">
            <fieldset class="input-group">
                <legend>From - To</legend>
                <div class="teir">
                    <input type="text" value="" placeholder="Lahore - Karachi">
                    <span class="icon">⇄</span>
                </div>
            </fieldset>
            <fieldset class="input-group trip-group">
                <legend>Trip</legend>
                <select>
                    <option>Return</option>
                </select>
            </fieldset>
            <fieldset class="input-group">
                <legend>Depart - Return</legend>
                <input type="text" value="" placeholder="07 Nov 22-13 Nov 22">
            </fieldset>
            <fieldset class="input-group">
                <legend>Passenger - Class</legend>
                <input type="text" value="" placeholder="1 Passenger, Economy">
            </fieldset>
        </form>
        <div class="kopp">
            <button class="qode">+ Add Promo Code</button>
            <button class="rex">
                <span class="plane-icon"><i class="fa-solid fa-plane"></i></span> Show Flights
            </button>
        </div>
    </div>
</body>

</html>
