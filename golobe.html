<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./golobe.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/css/flight-listing.css" />
</head>

<body>
    <nav>
        <header>
            <div class="header-left">
                <ul>
                    <li>
                        <i class="fa-solid fa-plane"></i><a href="#">Find Flight</a>
                    </li>
                    <li><i class="fa-solid fa-bed"></i><a href="#">Find Stays</a></li>
                </ul>
            </div>
            <div class="logo">
                <img src="./rasmlar/logo.webp" alt="">
            </div>
            <div class="header-right">
                <ul>
                    <li><i class="fa-solid fa-heart"></i><a href="#">Favourites</a></li>
                    <li>
                        <img src="./rasmlar/de42315813dc5b2e20dc60002c5ebc10bec549e3.jpg" alt="" /><a href="#">John
                            D.</a>
                    </li>
                </ul>
            </div>
        </header>
    </nav>
    <div class="main">
        <a href="#" class="link">Turkey</a>
        <span class="tex"></span>
        <a href="#" class="link">Istanbul</a>
        <span class="tex"></span>
        <span class="tex2">CVK Park Bosphorus Hotel Istanbul</span>
    </div>
    <div class="main2">
        <div class="vab">
            <div class="header">
                <div class="flight-info">
                    <h2>Emirates A380 Airbus</h2>
                    <p class="date">Return Wed, Dec 8</p>
                </div>
                <div class="price-info">
                    <span class="price">$240</span>
                    <p class="duration">2h 28m</p>
                </div>
            </div>

            <div class="main-content">
                <div class="airline-logo">
                    <div class="logo-box">
                        <img src="./rasmlar/emirates.png" alt="Emirates Logo">
                        <div class="logo-text">
                            <strong>Emirates</strong>
                            <span>Airbus A320</span>
                        </div>
                    </div>
                </div>

                <div class="icon">
                    <i class="fa-solid fa-plane"></i>
                    <i class="fa-solid fa-wifi"></i>
                    <i class="fa-solid fa-stopwatch"></i>
                    <i class="fa-solid fa-burger"></i>
                    <i class="fa-solid fa-wheelchair"></i>
                </div>
            </div>

            <div class="footer">
                <div class="departure">
                    <span class="time">12:00 pm</span>
                    <span class="airport">Newark(EWR)</span>
                </div>

                <div class="flight-path">
                    <div class="line"></div>
                    <span class="plane-icon">✈</span>
                    <div class="line"></div>
                </div>

                <div class="arrival">
                    <span class="time">12:00 pm</span>
                    <span class="airport">Newark(EWR)</span>
                </div>
            </div>
        </div>
    </div>
    <div class="main3">
        
    </div>
</body>

</html>
